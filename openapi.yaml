        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: correct-horse-battery-staple
    LoginResponse:
      discriminator:
        propertyName: requiresTwoFactor
        mapping:
          'true': '#/components/schemas/TwoFactorChallengeResponse'
          'false': '#/components/schemas/AuthenticatedResponse'
      oneOf:
        - $ref: '#/components/schemas/TwoFactorChallengeResponse'
        - $ref: '#/components/schemas/AuthenticatedResponse'
    TwoFactorChallengeResponse:
      type: object
      required:
        - requiresTwoFactor
        - twoFactorToken
      properties:
        requiresTwoFactor:
          type: boolean
          enum:
            - true
        twoFactorToken:
          type: string
          description: Short-lived opaque token used to complete 2FA verification
          example: eyJhbGciOiJIUzI1NiJ9...
    AuthenticatedResponse:
      type: object
      required:
        - requiresTwoFactor
        - user
        - token
      properties:
        requiresTwoFactor:
          type: boolean
          enum:
            - false
        user:
          $ref: '#/components/schemas/UserResponse'
        token:
          type:
            - string
            - 'null'
          description: Bearer token. Present when authenticated via token (iOS). Null for session-based auth (web).
          example: pp_tok_abc123...
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
        - currencyId
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: correct-horse-battery-staple
        name:
          type: string
          example: Leonardo
        currencyId:
          type: string
          format: uuid
          description: Default currency ID for the user
          example: 123e4567-e89b-12d3-a456-426655440000
    TwoFactorCompleteRequest:
      type: object
      required:
        - twoFactorToken
        - code
      properties:
        twoFactorToken:
          type: string
          description: The short-lived token returned from the login challenge
          example: eyJhbGciOiJIUzI1NiJ9...
        code:
          type: string
          description: 6-digit TOTP code from the authenticator app
          minLength: 6
          maxLength: 6
          example: '123456'
    RefreshResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: New bearer token
          example: pp_tok_abc123...
    ForgotPasswordRequest:
