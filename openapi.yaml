  /auth/2fa/verify:
    post:
      tags:
        - Auth
      summary: Confirm 2FA setup or complete login challenge
      operationId: verifyTwoFactor
      description: |
        Dual-purpose endpoint that supports both authenticated and unauthenticated contexts:

        **Setup confirmation (authenticated):**
        Called after `POST /auth/2fa/enable` to activate 2FA with a valid TOTP code.
        Requires an active session cookie. Request body: `{ "code": "123456" }`.

        **Login challenge (unauthenticated):**
        Called after a login that returned `requiresTwoFactor: true`, using the
        `twoFactorToken` from the login response. No session cookie required.
        Request body: `{ "code": "123456", "twoFactorToken": "..." }`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorCompleteRequest'
      responses:
        '200':
          description: 2FA verified — returns authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/2fa/disable:
    post:
      tags:
        - Auth
      summary: Disable 2FA
      operationId: disableTwoFactor
      description: Requires a valid TOTP code to confirm intent before disabling.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorDisableRequest'
      responses:
        '204':
          description: 2FA disabled successfully
        '400':
