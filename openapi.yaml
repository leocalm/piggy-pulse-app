components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
      description: Session cookie for authentication
    api_key:
      type: http
      scheme: bearer
      bearerFormat: opaque
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnauthorizedErrorResponse'
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequestErrorResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotFoundErrorResponse'
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/InternalServerErrorResponse'
    ServiceUnavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ServiceUnavailableErrorResponse'
    TooManyRequests:
      description: Too Many Requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Unprocessable Entity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequestErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConflictErrorResponse'
  parameters:
    PeriodId:
      name: periodId
      in: query
      required: true
      schema:
        type: string
        format: uuid
      description: The ID of the period
    Cursor:
      name: cursor
      in: query
      required: false
      description: Cursor for pagination
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      required: false
      description: Limit for pagination
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Id:
      name: id
      in: path
      required: true
      description: Entity id
      schema:
        type: string
        format: uuid
    Direction:
      name: direction
      in: query
      required: false
      schema:
        type: string
        enum:
          - income
          - expense
          - transfer
      description: Filter by transaction direction based on category type
    AccountId:
      name: accountId
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Filter by account ID
      example: 123e4567-e89b-12d3-a456-426655440000
    CategoryId:
      name: categoryId
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Filter by category ID
      example: 123e4567-e89b-12d3-a456-426655440000
    VendorId:
      name: vendorId
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Filter by vendor ID
      example: 123e4567-e89b-12d3-a456-426655440000
    FromDate:
      name: fromDate
      in: query
      required: false
      schema:
        type: string
        format: date
      description: Filter transactions from this date (inclusive)
      example: '2024-01-01'
    ToDate:
      name: toDate
      in: query
      required: false
      schema:
        type: string
        format: date
      description: Filter transactions up to this date (inclusive)
      example: '2024-01-31'
    Search:
      name: search
      in: query
      required: false
      schema:
        type: string
      description: "Search transactions by description or amount. Partial match, case-insensitive."
      example: groceries
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - database
      properties:
        status:
          type: string
          description: Status of the health check
          example: OK
        database:
          type: string
          description: Database status
          example: connected
    CurrentPeriod:
      type: object
      required:
        - spent
        - target
        - daysRemaining
        - daysInPeriod
        - projectedSpend
      properties:
        spent:
          type: integer
          description: Amount spent in the current period, in cents
          example: 10050
          minimum: 0
        target:
          type: integer
          description: Target amount for the current period, in cents
          example: 10000
          minimum: 0
        daysRemaining:
          type: integer
          description: Number of days remaining in the current period
          example: 10
          minimum: 0
        daysInPeriod:
          type: integer
          description: Number of days in the current period
          example: 30
          minimum: 0
        projectedSpend:
          type: integer
          description: Projected spend for the current period, in cents
          example: 10000
          minimum: 0
    NetPosition:
      type: object
      required:
        - total
        - differenceThisPeriod
        - numberOfAccounts
        - liquidAmount
        - protectedAmount
        - debtAmount
      properties:
        total:
          type: integer
          description: Total net position, in cents
          example: 10000
        differenceThisPeriod:
          type: integer
          description: Difference between the current period and the previous period, in cents
          example: 1000
        numberOfAccounts:
          type: integer
          description: Number of accounts in the net position
          example: 2
          minimum: 0
        liquidAmount:
          type: integer
          description: Liquid amount in the net position, in cents
          example: 10000
          minimum: 0
        protectedAmount:
          type: integer
          description: Protected amount in the net position, in cents
          example: 10000
          minimum: 0
        debtAmount:
          type: integer
          description: Debt amount in the net position, in cents
          example: 10000
          minimum: 0
    BudgetStability:
      type: object
      required:
        - stability
        - periodsWithinRange
        - periodsStability
      properties:
        stability:
          type: integer
          description: Stability of the budget, as a percentage
          example: 99
          minimum: 0
        periodsWithinRange:
          type: integer
          description: Number of periods within the budget stability range
          example: 10
          minimum: 0
        periodsStability:
          type: array
          items:
            type: boolean
          description: List of periods within the budget stability range
          example:
            - true
            - false
            - true
    NetPositionHistoryPoint:
      type: object
      required:
        - date
        - total
        - liquidAmount
        - protectedAmount
        - debtAmount
      properties:
        date:
          type: string
          format: date
          example: '2024-01-15'
        total:
          type: integer
