openapi: 3.1.0
info:
  title: PiggyPulse API
  version: 2.0.0
  description: PiggyPulse personal budgeting API
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.en.html
servers:
  - url: https://api.piggy-pulse.com/api/v2
    description: Production
security:
  - sessionCookie: []
  - api_key: []
paths:
  /health:
    get:
      tags:
        - Health
      operationId: healthCheck
      security: []
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /dashboard/current-period:
    get:
      tags:
        - Dashboard
      summary: Get current period for dashboard
      operationId: getDashboardCurrentPeriod
      parameters:
        - $ref: '#/components/parameters/PeriodId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentPeriod'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /dashboard/net-position:
