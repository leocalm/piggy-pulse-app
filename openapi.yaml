    AutomaticSchedule:
      type: object
      required:
        - scheduleType
        - startDayOfTheMonth
        - periodDuration
        - generateAhead
        - durationUnit
        - saturdayPolicy
        - sundayPolicy
        - namePattern
        - recurrenceMethod
      properties:
        scheduleType:
          type: string
          enum:
            - automatic
          description: Type of schedule
        recurrenceMethod:
          type: string
          description: How the period start date is determined
          enum:
            - dayOfMonth
            - businessDay
            - dayOfWeek
          default: dayOfMonth
          example: dayOfMonth
        startDayOfTheMonth:
          type: integer
          description: Day of the month to start the schedule
          example: 1
          minimum: 1
          maximum: 31
        periodDuration:
          type: integer
          description: Duration of each period in days
          example: 30
          minimum: 1
        generateAhead:
          type: integer
          description: Number of periods to generate ahead
          example: 3
          minimum: 1
        durationUnit:
          type: string
          enum:
            - days
            - weeks
            - months
          description: Unit of the period duration
          example: days
        saturdayPolicy:
          type: string
          enum:
            - keep
            - monday
            - friday
          description: Policy for Saturdays in the schedule
          example: keep
          default: keep
        sundayPolicy:
          type: string
          enum:
            - keep
            - monday
            - friday
          description: Policy for Sundays in the schedule
          example: keep
          default: keep
        namePattern:
          type: string
          description: Pattern for the period name
          example: '{MONTH} {YEAR}'
